<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Cydia Repo</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<div class="card">

<h1 class="title">My Cydia Repo</h1>

<p class="subtitle">
Add this repository to Cydia
</p>

<div class="repo-box">

<p id="repo">
https://USERNAME.github.io/REPO/
</p>

<button onclick="copyRepo()">Copy Repo</button>

</div>

<div class="guide">

<h2>How to install</h2>

<ol>
<li>Open Cydia</li>
<li>Go to Sources</li>
<li>Tap Edit → Add</li>
<li>Paste the repo URL</li>
</ol>

</div>

</div>

<script>

function copyRepo(){
let text=document.getElementById("repo").innerText
navigator.clipboard.writeText(text)
alert("Repo copied!")
}

</script>

</body>
</html>
